version: "3.8"
services:
  traefik:
    image: ${TRAEFIK_IMAGE}
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.network=easy-devops-proxy
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${EASY_DEVOPS_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - {target: 80, published: 80, protocol: tcp, mode: host}
      - {target: 443, published: 443, protocol: tcp, mode: host}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certificates:/letsencrypt
    networks: [proxy]
    deploy:
      placement:
        constraints: [node.role == manager]
networks:
  proxy:
    name: easy-devops-proxy
    external: true
volumes:
  certificates:
